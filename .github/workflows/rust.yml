name: Rust

on:
  push:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  CERTBOT_DOMAIN: paulmin.nl
  CERTBOT_VALIDATION: 876543

jobs:
  build:
    runs-on: ubuntu-slim
    steps:
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: paulusminus/rust-check@v6
        with:
          build: true
